name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Upgrade npm
        run: npm install -g npm@latest && npm config set registry https://registry.npmjs.org/

      - name: Publish
        run: npm publish --access public
